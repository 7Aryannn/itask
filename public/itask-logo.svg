<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 36" width="220" height="36">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#DDD6FE;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Icon background: rounded square -->
  <rect x="0" y="2" width="32" height="32" rx="8" fill="url(#iconGrad)"/>

  <!-- Checkmark -->
  <polyline
    points="7,18 13,24 25,12"
    fill="none"
    stroke="url(#checkGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- "iTask" text -->
  <text
    x="44"
    y="25"
    font-family="'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.3"
    fill="#1E1B4B"
  >iTask</text>

  <!-- Separator dot -->
  <circle cx="103" cy="19" r="2" fill="#7C3AED" opacity="0.5"/>

  <!-- Tagline text -->
  <text
    x="111"
    y="25"
    font-family="'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#6D6E8A"
    letter-spacing="0.1"
  >Your Task Planner</text>
</svg>
